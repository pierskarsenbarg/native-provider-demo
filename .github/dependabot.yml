version: 2
updates:
  - package-ecosystem: gomod
    directory: /provider
    schedule:
      interval: weekly
    assignees:
      - pierskarsenbarg
    commit-message:
      prefix: chore
    groups:
      go-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /service
    schedule:
      interval: weekly
    assignees:
      - pierskarsenbarg
    commit-message:
      prefix: chore
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    assignees:
      - pierskarsenbarg
    commit-message:
      prefix: chore
    groups:
      github-actions:
        patterns:
          - "*"
